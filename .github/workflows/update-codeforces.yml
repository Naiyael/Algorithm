name: Update Codeforces Stats

on:
  schedule:
    - cron: "0 16 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python scripts/update_codeforces_stats.py
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update Codeforces stats"
